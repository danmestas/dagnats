{{define "content"}}
<section class="page page-ops-leases" data-page="ops-leases">
  <header class="page-header">
    <a class="page-back" href="/console/ops">← Ops</a>
    <h1>Leases</h1>
  </header>

  {{if .Page.Note}}
  <aside class="callout callout-info" role="status">
    <p>{{.Page.Note}}</p>
  </aside>
  {{end}}

  <table class="data-table" id="leases-table">
    <thead>
      <tr>
        <th>Lease</th>
        <th>Worker</th>
        <th>Workflow</th>
        <th>Step</th>
        <th>Acquired</th>
        <th>Expires</th>
      </tr>
    </thead>
    <tbody id="leases-tbody">
      {{range .Page.Leases}}
      <tr id="lease-row-{{.ID}}" {{if .NearExpiry}}class="row-near-expiry"{{end}}>
        <td class="mono">{{.ID}}</td>
        <td class="mono">{{.Worker}}</td>
        <td>{{.Workflow}}</td>
        <td>{{.Step}}</td>
        <td>{{.Acquired}}</td>
        <td>{{.Expires}}</td>
      </tr>
      {{else}}
      <tr class="empty-row">
        <td colspan="6">no leases reporting — see callout above</td>
      </tr>
      {{end}}
    </tbody>
  </table>
</section>
{{end}}
