{{define "content"}}{{$page := .Page}}{{with $page}}
<section class="console-section">
  <header class="console-section-header">
    <h1>Audit log</h1>
    <p class="console-lede">
      {{if .Total}}{{.Total}} recent operator actions.{{else}}No actions recorded yet.{{end}}
    </p>
  </header>

  <form class="console-filter-bar" method="GET" action="/console/ops/audit">
    <label class="console-field">
      <span>Actor</span>
      <input class="input" type="text" name="actor" value="{{.ActorFilter}}"
             placeholder="exact actor name" autocomplete="off">
    </label>
    <label class="console-field">
      <span>Action</span>
      <select class="select" name="action">
        <option value=""{{if eq .ActionFilter ""}} selected{{end}}>any</option>
        {{range .Actions}}
        <option value="{{.}}"{{if eq $page.ActionFilter (printf "%s" .)}} selected{{end}}>{{.}}</option>
        {{end}}
      </select>
    </label>
    <label class="console-field">
      <span>Range</span>
      <select class="select" name="range" onchange="this.form.submit()">
        <option value=""{{if eq .RangeFilter ""}} selected{{end}}>all</option>
        <option value="1h"{{if eq .RangeFilter "1h"}} selected{{end}}>last hour</option>
        <option value="24h"{{if eq .RangeFilter "24h"}} selected{{end}}>last 24h</option>
        <option value="7d"{{if eq .RangeFilter "7d"}} selected{{end}}>last 7 days</option>
      </select>
    </label>
    <button type="submit" class="btn">Filter</button>
  </form>

  <div class="card">
    <table class="table console-table">
      <thead>
        <tr>
          <th>Time</th>
          <th>Actor</th>
          <th>Action</th>
          <th>Target</th>
          <th>Outcome</th>
          <th>Data</th>
        </tr>
      </thead>
      <tbody id="audit-tbody">
        {{template "audit-tbody" .}}
      </tbody>
    </table>
  </div>
</section>
{{end}}{{end}}
