{{define "content"}}
<section class="page page-streams-list" data-page="streams-list">
  {{template "page-header" .Page.Header}}

  <table class="table console-table" id="streams-table">
    <thead>
      <tr>
        <th>Stream</th>
        <th>Subjects</th>
        <th>Messages</th>
        <th>Bytes</th>
        <th>Consumers</th>
      </tr>
    </thead>
    <tbody id="streams-tbody">
      {{range .Page.Streams}}
      <tr id="stream-row-{{.Name}}">
        <td class="mono">{{.Name}}</td>
        <td class="mono">{{.Subjects}}</td>
        <td>{{.Messages}}</td>
        <td>{{.Bytes}}</td>
        <td>{{.Consumers}}</td>
      </tr>
      {{else}}
      <tr class="empty-row">
        <td colspan="5">No JetStream streams reachable.</td>
      </tr>
      {{end}}
    </tbody>
  </table>
</section>
{{end}}
