{{define "content"}}
<section class="page page-ops" data-page="ops-index">
  {{template "page-header" .Page.Header}}

  <div class="ops-tiles" role="list">
    {{range .Page.Tiles}}
    <a class="ops-tile" role="listitem" href="{{.Href}}"
       data-tile-section="{{.Section}}">
      <h2 class="ops-tile-title">{{.Title}}</h2>
      <p class="ops-tile-metric">{{.MetricText}}</p>
      <p class="ops-tile-hint">{{.Hint}}</p>
    </a>
    {{end}}
  </div>
</section>
{{end}}
