{{define "content"}}
<section class="page page-workers-list" data-page="workers-list">
  {{template "page-header" .Page.Header}}

  <table class="table console-table" id="workers-table">
    <thead>
      <tr>
        <th>Worker</th>
        <th>Task types</th>
        <th>Host</th>
        <th>Last seen</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="workers-tbody">
      {{range .Page.Workers}}
      <tr id="worker-row-{{.WorkerID}}">
        <td class="mono">{{.WorkerID}}</td>
        <td>{{.TaskTypes}}</td>
        <td>{{.Host}}</td>
        <td>{{.LastSeen}}</td>
        <td>{{.Status}}</td>
      </tr>
      {{else}}
      <tr class="empty-row">
        <td colspan="5">No workers currently registered.</td>
      </tr>
      {{end}}
    </tbody>
  </table>
</section>
{{end}}
