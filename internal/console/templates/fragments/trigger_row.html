{{define "trigger-row"}}
<tr id="trigger-row-{{.Row.ID}}"
    data-href="/console/triggers/{{.Row.ID}}"
    {{if .Fresh}}data-fresh="true"{{end}}>
  <td>
    <span class="trigger-icon" data-kind="{{.Row.Kind}}" aria-hidden="true">{{triggerKindGlyph .Row.Kind}}</span>
    <span class="badge badge-outline">{{.Row.Kind}}</span>
  </td>
  <td class="console-mono">
    <a href="/console/triggers/{{.Row.ID}}">{{.Row.ID}}</a>
  </td>
  <td class="console-mono">
    {{if .Row.Workflow}}<a href="/console/workflows/{{.Row.Workflow}}">{{.Row.Workflow}}</a>{{else}}<span class="muted">&mdash;</span>{{end}}
  </td>
  <td class="console-mono">{{.Row.Target}}</td>
  <td>
    <span class="dn-switch{{if .Row.Enabled}} dn-on{{end}}"
          role="switch"
          tabindex="0"
          aria-checked="{{.Row.Enabled}}"
          aria-label="{{if .Row.Enabled}}Disable{{else}}Enable{{end}} trigger {{.Row.ID}}"
          data-trigger-toggle="{{.Row.ID}}"
          data-trigger-current="{{.Row.Enabled}}"
          {{if .ReadOnly}}aria-disabled="true" title="Console is read-only. Set CONSOLE_READ_ONLY=false to toggle triggers."{{end}}>
      <span class="dn-knob" aria-hidden="true"></span>
      <span class="sr-only">{{.Row.StatusLabel}}</span>
    </span>
  </td>
  <td class="console-sparkline-col">{{if .Row.Sparkline}}<canvas class="console-sparkline" data-sparkline-id="trigger-{{.Row.ID}}" data-sparkline-data="{{jsonArray .Row.Sparkline}}" width="60" height="16" aria-label="Activity sparkline for {{.Row.ID}}"></canvas>{{end}}</td>
  <td class="trigger-action-cell">
    {{if .Row.CanFire}}<button type="button" class="btn btn-small trigger-fire-btn" data-trigger-id="{{.Row.ID}}" aria-label="Fire trigger {{.Row.ID}} now">Fire now</button>{{end}}
  </td>
  {{template "row-chevron"}}
</tr>
{{end}}
