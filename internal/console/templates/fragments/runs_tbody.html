{{define "runs-tbody"}}<tbody id="runs-tbody">
  {{range .Rows}}
  <tr id="run-row-{{.RunID}}">
    <td class="console-mono"><a href="/console/runs/{{.RunID}}">{{.RunIDShort}}</a></td>
    <td><a href="/console/workflows/{{.WorkflowID}}">{{.WorkflowID}}</a></td>
    <td>{{template "status-badge" .Status}}</td>
    <td><span class="badge badge-outline">{{.TriggerKind}}</span></td>
    <td class="console-mono">{{.StartedAt}}</td>
    <td>{{.Duration}}</td>
    <td>
      <button type="button" class="btn btn-sm btn-outline"
              data-sidesheet-target
              data-on:click="@get('/console/api/runs/{{.RunID}}/sheet')">Inspect</button>
    </td>
    {{template "row-chevron"}}
  </tr>
  {{else}}
  <tr id="run-row-empty"><td colspan="8" class="console-empty">no runs match these filters</td></tr>
  {{end}}
</tbody>{{end}}
