{{define "dlq-row"}}
<tr id="dlq-row-{{.Row.Sequence}}"
    {{if .Fresh}}data-fresh="true"{{end}}>
  <td class="console-mono">
    <a href="/console/dlq/{{.Row.Sequence}}">#{{.Row.Sequence}}</a>
  </td>
  <td title="{{.Row.ReasonFull}}">{{.Row.ReasonShort}}</td>
  <td class="console-mono">
    {{if .Row.Workflow}}<a href="/console/workflows/{{.Row.Workflow}}">{{.Row.Workflow}}</a>{{else}}<span class="muted">&mdash;</span>{{end}}
  </td>
  <td class="console-mono">
    {{if .Row.OriginalRunID}}<a href="/console/runs/{{.Row.OriginalRunID}}">{{.Row.OriginalRunIDS}}</a>{{else}}<span class="muted">&mdash;</span>{{end}}
  </td>
  <td class="console-mono">{{.Row.FailedAt}}</td>
  <td>{{.Row.Attempts}}</td>
  <td>
    <a class="btn btn-outline" href="/console/dlq/{{.Row.Sequence}}">Inspect</a>
  </td>
</tr>
{{end}}
