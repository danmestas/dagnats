{{define "run-step-row"}}<li class="step-list-row timeline-row" id="step-row-{{.ID}}" data-step-id="{{.ID}}" data-state="{{.State}}">
  <span class="timeline-name">
    <span class="step-status step-status-{{.State}}" aria-hidden="true">{{.Icon}}</span>
    <span class="step-name">{{.Name}}</span>
  </span>
  <span class="timeline-track">
    {{if gt .WidthPct 0.0}}
    <span class="timeline-bar{{if eq .State "failed"}} step-state-failed dn-fail{{end}}"
          style="left:{{printf "%.2f" .OffsetPct}}%;width:{{printf "%.2f" .WidthPct}}%"></span>
    {{end}}
  </span>
  <span class="timeline-dur console-mono">{{if .Duration}}{{.Duration}}{{else}}&mdash;{{end}}</span>
  {{if .Error}}
  <span class="timeline-error" role="alert" title="{{.Error}}">{{.Error}}</span>
  {{end}}
</li>{{end}}
