{{define "dashboard_tile"}}
<a class="dashboard-tile tile-state-{{.State}}"
   id="{{.DOMID}}"
   href="{{.LinkHref}}"
   aria-labelledby="{{.DOMID}}-title">
  <header class="dashboard-tile-header">
    <span class="dashboard-tile-title" id="{{.DOMID}}-title">{{.Title}}</span>
    <span class="dashboard-tile-arrow" aria-hidden="true">&rarr;</span>
  </header>
  <p class="dashboard-tile-value">
    <span class="dashboard-tile-number">{{.Value}}</span>
    {{if .Unit}}<span class="dashboard-tile-unit">{{.Unit}}</span>{{end}}
  </p>
  {{if .Spark}}{{with sparkExpr .Spark}}<span class="console-spark dashboard-tile-spark" aria-hidden="true">{{.}}</span>{{end}}{{end}}
  {{if .Hint}}
  <p class="dashboard-tile-hint">{{.Hint}}</p>
  {{end}}
</a>
{{end}}
