{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}} — DagNats</title>
  <link rel="stylesheet" href="/static/dag.css">
  <script type="module"
    src="https://cdn.jsdelivr.net/gh/starfederation/datastar@v1.0.0/bundles/datastar.js">
  </script>
</head>
<body>
  <div class="app-layout">
    {{template "sidebar" .}}
    <main class="main-content">
      {{template "content" .}}
    </main>
  </div>
</body>
</html>
{{end}}
