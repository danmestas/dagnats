name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Datastar kebab-form lint
        # Datastar v1 uses camelCase event handlers (data-on-keyup).
        # The kebab + double-underscore form (data-on-keyup__) is a
        # v0 holdover that silently no-ops on v1, which surfaces as
        # "filter input doesn't filter" bugs. Guard every PR — not
        # just code-touching ones — because templates are HTML, not
        # Go, and a doc-only PR could still regress them.
        run: |
          if grep -rE 'data-on-[a-z]+__' internal/console/templates/; then
            echo "::error::Kebab-form Datastar attributes found. Use camelCase form (data-on-keyup, not data-on-keyup__)."
            exit 1
          fi

      - name: Detect code changes
        id: filter
        # On PR events, query the API for the changed files and decide
        # whether to run the Go pipeline. On push (to main after merge),
        # always run. Branch protection requires the `test` check, so
        # this job always reports — doc-only PRs short-circuit cleanly
        # rather than triggering a 3-minute Go test run that has no
        # bearing on the diff.
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            echo "push to main → running full Go pipeline"
            exit 0
          fi
          files=$(gh api \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            --paginate --jq '.[].filename')
          echo "Changed files:"
          echo "$files" | sed 's/^/  /'
          if echo "$files" | grep -qE '\.go$|^go\.(mod|sum)$|^\.github/workflows/|^Makefile$'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            echo "→ code paths touched, running full Go pipeline"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
            echo "→ doc-only PR, Go pipeline will be skipped"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/setup-go@v5
        if: steps.filter.outputs.code == 'true'
        with:
          go-version-file: go.mod

      - name: Format check
        if: steps.filter.outputs.code == 'true'
        run: test -z "$(gofmt -l .)"

      - name: Vet
        if: steps.filter.outputs.code == 'true'
        run: go vet ./...

      - name: TracingPublisher wrapper lint
        if: steps.filter.outputs.code == 'true'
        # Forbid raw NATS publishes outside the TracingPublisher
        # wrapper (#334). The wrapper auto-injects W3C trace context
        # on every outbound message. Bypassing it leaves new publish
        # sites silently un-traced, which is the regression vector
        # the ADR-rejected audit-pass tried to address. The exclusion
        # for internal/natsutil/publish.go is the wrapper's own body
        # (where the underlying js.PublishMsg / nc.PublishMsg calls
        # have to live). _test.go is excluded because tests legitimately
        # use raw publishes to drive subjects we want to subscribe to.
        #
        # Deliberate escape hatch: jetstreamext.PublishMsgBatch (atomic
        # batch) is OUTSIDE this wrapper's surface. See publishAtomicBatches
        # in internal/engine/task_publish.go — trace context is injected
        # per-message before the batch call. The grep pattern does not
        # match jetstreamext.* so this exception is enforced by the
        # pattern itself.
        run: |
          set -eu
          # shellcheck disable=SC2046
          if matches=$(grep -rnE 'js\.(Publish|PublishMsg)\b|nc\.(Publish|PublishMsg)\b' \
              --include='*.go' \
              --exclude='*_test.go' \
              --exclude='publish.go' \
              internal/ worker/ bridge/); then
            echo "::error::Raw NATS publish found. Use natsutil.TracingPublisher."
            echo "$matches"
            exit 1
          fi

      - name: Staticcheck
        if: steps.filter.outputs.code == 'true'
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: Test
        if: steps.filter.outputs.code == 'true'
        # 600s matches the Makefile's `make test` timeout. The worker
        # package alone takes ~75s locally and the embedded NATS
        # supercluster e2e adds ~80s; CI runners with constrained
        # resources occasionally exceeded the previous 300s budget,
        # tripping the worker package's per-test timeout. See
        # memory/project_ci_doc_only_skip.md for surfacing history.
        run: go test ./... -timeout 600s -count=1
        env:
          E2E_TOPOLOGY: embedded

      - name: Assert main dagnats binary is CGO-free
        if: steps.filter.outputs.code == 'true'
        # The main dagnats binary must stay pure-Go even after #188
        # adds a CGO release artifact for dagnats-mcp-duckdb. A
        # regression here would inflate every dagnats deployment
        # with a libstdc++ dependency it doesn't need.
        run: |
          set -eu
          CGO_ENABLED=0 go build -trimpath -o /tmp/dagnats ./cmd/dagnats
          if go version -m /tmp/dagnats | grep -q 'CGO_ENABLED=1'; then
            echo "ERROR: main dagnats binary must stay CGO-free"
            go version -m /tmp/dagnats | grep -E 'CGO|cgo|build' || true
            exit 1
          fi
          echo "OK: main dagnats binary is CGO-free"
