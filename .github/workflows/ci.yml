name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Format check
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: Test
        # 600s matches the Makefile's `make test` timeout. The worker
        # package alone takes ~75s locally and the embedded NATS
        # supercluster e2e adds ~80s; CI runners with constrained
        # resources occasionally exceeded the previous 300s budget,
        # tripping the worker package's per-test timeout. See
        # memory/project_ci_doc_only_skip.md for surfacing history.
        run: go test ./... -timeout 600s -count=1
        env:
          E2E_TOPOLOGY: embedded
